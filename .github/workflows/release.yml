name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            asset_name: kinetic_${{ github.ref_name }}_darwin_x86_64.tar.gz
            binary_name: kinetic
          - goos: darwin
            goarch: arm64
            asset_name: kinetic_${{ github.ref_name }}_darwin_arm64.tar.gz
            binary_name: kinetic
          - goos: linux
            goarch: amd64
            asset_name: kinetic_${{ github.ref_name }}_linux_x86_64.tar.gz
            binary_name: kinetic
          - goos: linux
            goarch: arm64
            asset_name: kinetic_${{ github.ref_name }}_linux_arm64.tar.gz
            binary_name: kinetic
          - goos: windows
            goarch: amd64
            asset_name: kinetic_${{ github.ref_name }}_windows_x86_64.zip
            binary_name: kinetic.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build frontend assets
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o "dist/${{ matrix.binary_name }}" \
            ./cmd/kinetic

      - name: Package unix artifact
        if: matrix.goos != 'windows'
        run: |
          tar -C dist -czf "dist/${{ matrix.asset_name }}" "${{ matrix.binary_name }}"

      - name: Package windows artifact
        if: matrix.goos == 'windows'
        run: |
          cd dist
          zip -9 "${{ matrix.asset_name }}" "${{ matrix.binary_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts and generate checksums
        run: |
          mkdir -p release-dist
          find release-assets -maxdepth 2 -type f -exec mv {} release-dist/ \;
          cd release-dist
          sha256sum * > checksums.txt

      - name: Resolve previous tag
        id: previous-tag
        run: |
          git fetch --tags --force
          previous_tag=$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "${GITHUB_REF_NAME}" | head -n 1 || true)
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Generate release highlights from PR titles
        uses: actions/github-script@v7
        env:
          CURRENT_TAG: ${{ github.ref_name }}
          PREVIOUS_TAG: ${{ steps.previous-tag.outputs.previous_tag }}
        with:
          script: |
            const fs = require('fs')

            const owner = context.repo.owner
            const repo = context.repo.repo
            const currentTag = process.env.CURRENT_TAG
            const previousTag = process.env.PREVIOUS_TAG

            let commits = []

            if (previousTag) {
              commits = await github.paginate(
                github.rest.repos.compareCommitsWithBasehead,
                {
                  owner,
                  repo,
                  basehead: `${previousTag}...${currentTag}`,
                  per_page: 100,
                },
                (response) => response.data.commits,
              )
            } else {
              commits = await github.paginate(
                github.rest.repos.listCommits,
                {
                  owner,
                  repo,
                  sha: currentTag,
                  per_page: 100,
                },
              )
            }

            const pullRequests = new Map()

            for (const commit of commits) {
              const prs = await github.paginate(
                github.rest.repos.listPullRequestsAssociatedWithCommit,
                {
                  owner,
                  repo,
                  commit_sha: commit.sha,
                  per_page: 100,
                },
              )

              for (const pr of prs) {
                if (!pr.merged_at) {
                  continue
                }
                pullRequests.set(pr.number, pr)
              }
            }

            const sortedPullRequests = Array.from(pullRequests.values()).sort((left, right) => left.number - right.number)

            let notes = '## Highlights\n\n'

            if (sortedPullRequests.length === 0) {
              notes += '- No merged PR titles were detected for this release.\n'
            } else {
              for (const pr of sortedPullRequests) {
                notes += `- #${pr.number} ${pr.title}\n`
              }
            }

            fs.writeFileSync('release-notes.md', notes)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            release-dist/*
